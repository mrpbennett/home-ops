---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.18.0
          args:
            - --source=service
            - --source=ingress
            - --source=gateway-httproute
            # AdGuard only supports A/AAAA/CNAME records, no TXT ownership tracking
            - --registry=noop
            - --policy=upsert-only
            - --provider=webhook
            - --webhook-provider-url=http://localhost:8888
            - --interval=120s
            - --min-event-sync-interval=10s
            - --log-level=info
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: adguard-webhook
          image: ghcr.io/muhlba91/external-dns-provider-adguard:v11.1.1
          envFrom:
            - secretRef:
                name: external-dns-adguard
          ports:
            - containerPort: 8888
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      securityContext:
        fsGroup: 65534 # For ExternalDNS to be able to read Kubernetes token files
