---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    chart: vault
    repoURL: https://helm.releases.hashicorp.com
    targetRevision: 0.32.0
    helm:
      valuesObject:
        global:
          enabled: true

        server:
          ingress:
            enabled: true
            annotations:
              cert-manager.io/cluster-issuer: 'letsencrypt-cloudflare-dns-issuer'
            ingressClassName: nginx
            pathType: Prefix
            hosts:
              - host: vault.70ld.dev
            tls:
              - secretName: vault-tls
                hosts:
                  - vault.70ld.dev

        ui:
          enabled: true
          externalPort: 8200
          targetPort: 8200

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
