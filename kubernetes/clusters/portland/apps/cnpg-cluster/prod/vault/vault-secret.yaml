---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
spec:
  address: http://vault.vault.svc.cluster.local:8200
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: vault-auth
spec:
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: vso-role
    serviceAccount: default
  vaultConnectionRef: vault-connection
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: vault-seaweedfs-cloudnativepg-dev-backup
spec:
  vaultAuthRef: vault-auth
  mount: kv
  type: kv-v2
  path: seaweedfs/cloudnativepg-prod-backup
  refreshAfter: 60s
  destination:
    name: seaweedfs-cloudnativepg
    create: true
