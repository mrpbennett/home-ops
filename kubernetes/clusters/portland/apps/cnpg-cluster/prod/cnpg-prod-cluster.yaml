---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-prod-cluster
  namespace: cnpg-prod-cluster
spec:
  description: '70LD CNPG PROD Cluster'
  instances: 1
  startDelay: 3600
  stopDelay: 300
  primaryUpdateStrategy: unsupervised
  probes:
    startup:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
  projectedVolumeTemplate:
    sources: []
  postgresql:
    parameters:
      shared_buffers: '256MB'
  resources:
    requests:
      memory: '750Mi'
      cpu: 250m
    limits:
      memory: '1Gi'
      cpu: 500m
  storage:
    storageClass: longhorn
    size: 8Gi
  bootstrap:
    initdb:
      database: main
      owner: paul
      secret:
        name: cnpg-cluster-user
  enableSuperuserAccess: true
  superuserSecret:
    name: cnpg-cluster-superuser
  managed:
    roles:
      # Role: My personal user
      - name: paul
        ensure: present
        comment: "Paul's CNPG Cluster User"
        login: true
        superuser: true
        passwordSecret:
          name: cnpg-cluster-user

      - name: monispeed
        ensure: present
        comment: 'monispeed DB'
        login: true
        superuser: true
        passwordSecret:
          name: cnpg-cluster-user

      - name: authentik
        ensure: present
        comment: 'Simple application user for Authentik'
        login: true
        superuser: true
        passwordSecret:
          name: cnpg-authentik-user

      - name: nessie
        ensure: present
        comment: 'Nessie catalog server'
        login: true
        superuser: false
        passwordSecret:
          name: cnpg-nessie-user
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: postgres-rw-svc
              annotations:
                metallb.universe.tf/loadBalancerIPs: 192.168.7.80
            spec:
              type: LoadBalancer
  backup:
    retentionPolicy: "3d"
    barmanObjectStore:
      destinationPath: s3://cloudnativepg-backup
      endpointURL: http://seaweedfs-s3.seaweedfs.svc.cluster.local:8333
      wal:
        compression: gzip
      s3Credentials:
        accessKeyId:
          name: seaweedfs-cloudnativepg
          key: AWS_ACCESS_KEY_ID
        secretAccessKey:
          name: seaweedfs-cloudnativepg
          key: AWS_SECRET_ACCESS_KEY

  affinity:
    enablePodAntiAffinity: true
    topologyKey: failure-domain.beta.kubernetes.io/zone
  monitoring:
    enablePodMonitor: true
