apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rustfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: rustfs
    repoURL: https://charts.rustfs.com
    targetRevision: 0.0.83
    helm:
      valuesObject:
        replicaCount: 1
        mode:
          standalone:
            enabled: true
            strategy:
              type: RollingUpdate
          distributed:
            enabled: false
        secret:
          rustfs:
            access_key: rustfsadmin
            secret_key: rustfsadmin
        config:
          rustfs:
            volumes: "/data/rustfs0"
            address: ":9000"
            console_enable: "true"
            console_address: ":9001"
            log_level: "info"
            region: "us-east-1"
            domains: "rustfs.home.local"
            log_rotation:
              keep_files: 30
        service:
          type: LoadBalancer
        ingress:
          enabled: true
          className: nginx
          nginxAnnotations:
            nginx.ingress.kubernetes.io/affinity: cookie
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.ingress.kubernetes.io/session-cookie-expires: "3600"
            nginx.ingress.kubernetes.io/session-cookie-hash: sha1
            nginx.ingress.kubernetes.io/session-cookie-max-age: "3600"
            nginx.ingress.kubernetes.io/session-cookie-name: rustfs
          hosts:
            - host: rustfs.home.local
              paths:
                - path: /
                  pathType: Prefix
          tls:
            enabled: true
            certManager: true
            secretName: rustfs-tls
            crt: tls.crt
            key: tls.key
        storageclass:
          name: longhorn
          dataStorageSize: 10Gi
          logStorageSize: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: rustfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
