---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: velero
    repoURL: https://vmware-tanzu.github.io/helm-charts
    targetRevision: 11.3.2
    helm:
      valuesObject:
        namespace:
          labels:
            # Enforce Pod Security Standards with Namespace Labels
            # https://kubernetes.io/docs/tasks/configure-pod-container/enforce-standards-namespace-labels/
            pod-security.kubernetes.io/enforce: privileged
            pod-security.kubernetes.io/enforce-version: latest
            pod-security.kubernetes.io/audit: privileged
            pod-security.kubernetes.io/audit-version: latest
            pod-security.kubernetes.io/warn: privileged
            pod-security.kubernetes.io/warn-version: latest

        initContainers:
          - name: velero-plugin-for-aws
            image: velero/velero-plugin-for-aws:v1.13.0
            imagePullPolicy: IfNotPresent
            volumeMounts:
              - mountPath: /target
                name: plugins

        extraObjects:
          - apiVersion: v1
            kind: Secret
            metadata:
              name: velero-seaweedfs-creds
              namespace: velero
            type: Opaque
            stringData:
              cloud: |
                [default]
                aws_access_key_id=O40ZI95O419SJCXUPY0U
                aws_secret_access_key=2iJLVtdWW+puX4yAI5GWEN06ejRieL68Vjl9UCrb
        configuration:
          backupStorageLocation:
            - name: seaweedfs
              provider: aws
              bucket: velero
              accessMode: ReadWrite
              config:
                region: seaweedfs
                s3ForcePathStyle: "true"
                s3Url: http://seaweedfs.70ld.dev:8443
                insecureSkipTLSVerify: "false"

          # Disable volume snapshots since only backing up Kubernetes resources
          volumeSnapshotLocation: []

        credentials:
          useSecret: true
          existingSecret: velero-seaweedfs-creds

        schedules:
          daily-backup:
            disabled: false
            schedule: '0 1 * * *'
            template:
              ttl: '72h0m0s'
              storageLocation: seaweedfs
              includedNamespaces:
                - '*'
              excludedClusterScopedResources:
                - persistentVolumeClaims

  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
