---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: &app_name cluster-resources
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - matrix:
        generators:
          - list:
              elements:
                # - cluster: portland
                - cluster: corfe
          - list:
              elements:
                - app_name: *app_name
                  project: default
                  repo_url: https://github.com/mrpbennett/home-ops.git
  template:
    metadata:
      name: '{{.app_name}}-{{.cluster}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{.project}}'
      source:
        repoURL: '{{.repo_url}}'
        path: 'kubernetes/clusters/{{.cluster}}/CLUSTER'
        targetRevision: HEAD
        directory:
          recurse: true
      destination:
        name: '{{.cluster}}'
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - Validate=true
          - CreateNamespace=false
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 5m0s
            factor: 2
