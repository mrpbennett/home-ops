---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: &app_name minecraft-server
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ['missingkey=error']
  generators:
    - list:
        elements:
          # - cluster: portland
          - cluster: corfe

    - list:
        elements:
          - app_name: *app_name
            project: default
            repo_url: https://github.com/mrpbennett/home-ops.git
            clusterURL: 'https://kubernetes.default.svc'
  template:
    metadata:
      name: '{{.app_name}}-{{.cluster}}'
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: '{{.project}}'
      source:
        repoURL: '{{.repo_url}}'
        path: 'kubernetes/clusters/{{.cluster}}/apps/{{.app_name}}'
        targetRevision: HEAD
        directory:
          recurse: true
      destination:
        server: '{{.clusterURL}}'
        namespace: '{{.app_name}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - Validate=true
          - CreateNamespace=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            maxDuration: 5m0s
            factor: 2
