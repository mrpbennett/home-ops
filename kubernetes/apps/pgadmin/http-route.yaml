---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin-route
  namespace: pgadmin
spec:
  parentRefs:
    - name: envoy-shared-gateway
      namespace: envoy-gateway-system
  hostnames:
    - 'pgadmin.70ld.dev'
  rules:
    - matches:
        - path:
            type: Prefix
            value: /
      backendRefs:
        - name: pgadmin-service
          port: 5050
